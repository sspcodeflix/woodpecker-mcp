# Local stack: FalkorDB (the graph backend) + woodpecker-mcp (HTTP MCP server).
#   docker compose up -d
#   # FalkorDB Browser to explore the graph: http://localhost:3000
#   # MCP endpoint for Holmes:                http://localhost:8000/mcp
services:
  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "3000:3000"        # FalkorDB Browser - remap if 3000 is taken (e.g. Grafana)
    volumes:
      - falkordb-data:/data

  woodpecker-mcp:
    build: .
    restart: unless-stopped
    depends_on: [falkordb]
    ports:
      - "8000:8000"
    environment:
      WP_GRAPH_BACKEND: falkordb
      WP_FALKOR_HOST: falkordb          # the service name above
      WP_TOPOLOGY: docker
      WP_COMPOSE_PROJECT: demo_env
      WP_PROM_URL: http://host.docker.internal:9091
      WP_MONITORED_SERVICES: web,orders,db
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # for the docker topology connector
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  falkordb-data:
