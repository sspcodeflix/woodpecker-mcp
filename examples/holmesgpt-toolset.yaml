# Register woodpecker-mcp with HolmesGPT as a stdio MCP toolset.
#
#   holmes ask "find the root cause" -t examples/holmesgpt-toolset.yaml
#   # or merge the `toolsets:` block into ~/.holmes/config.yaml
#
# HolmesGPT stays vanilla — it only launches this server as a subprocess and
# discovers its tools. No fork, no custom Holmes image.

toolsets:
  woodpecker-graph:
    type: mcp
    enabled: true
    description: >-
      Materialized service dependency graph (Kùzu). Deterministic deepest-failing-
      service root cause, blast radius, and observability blind-spot detection —
      the relationship reasoning Holmes infers ephemerally per-investigation but
      never stores. Call woodpecker_get_topology first, then
      woodpecker_diagnose_root_cause.
    config:
      mode: stdio
      command: "woodpecker-mcp"          # the installed entry point (pip install woodpecker-mcp)
      args: ["serve"]
      health_check_tool: "woodpecker_get_topology"
      env:
        PATH: "{{ env.PATH }}"           # so the topology connector finds docker/kubectl
        WP_TOPOLOGY: "docker"            # docker | k8s
        WP_COMPOSE_PROJECT: "demo_env"
        WP_PROM_URL: "http://localhost:9091"
        WP_KUZU_PATH: "/tmp/woodpecker.kuzu"

